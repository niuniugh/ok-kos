services:
  db:
    image: postgres:17-alpine
    container_name: okkos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-okkos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-okkos}
    volumes:
      - okkos_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-okkos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: okkos-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-okkos}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-okkos}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      COOKIE_SECURE: "true"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: okkos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: okkos-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  okkos_data:
  certbot_www:
  certbot_conf:
